<div id="hud">

    <!-- LEFT: Wumpa + Lives -->
    <div class="hud-group">

        <!-- Wumpa counter -->
        <div class="hud-item" id="hud-wumpa">
            <div class="hud-icon wumpa"><img src="textures/wumpa.png" alt="Wumpa"></div>
            <div>
                <div class="hud-label">Wumpa</div>
                <div class="hud-value wumpa-val" id="wumpa-count">0</div>
            </div>
        </div>

        <!-- Life counter -->
        <div class="hud-item" id="hud-lives">
            <div class="hud-icon lives"><img src="textures/crashFace.png" alt="Lives"></div>
            <div>
                <div class="hud-label">Lives</div>
                <div class="hud-value lives-val" id="lives-count">3</div>
            </div>
        </div>

    </div>

    <!-- CENTRE: Score -->
    <div class="hud-score-group">
        <div class="hud-score-label">Score</div>
        <div class="hud-score-value" id="score-count">0</div>
    </div>

    <!-- RIGHT: Boxes -->
    <div class="hud-group">

        <!-- Broken boxes counter -->
        <div class="hud-item" id="hud-boxes">
            <div class="hud-icon boxes"><img src="textures/blocks/standard.jpg" alt="Boxes"></div>
            <div>
                <div class="hud-label">Boxes</div>
                <div class="hud-value boxes-val" id="boxes-count">0</div>
            </div>
        </div>
    </div>

</div>
